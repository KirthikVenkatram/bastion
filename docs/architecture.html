<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bastion Architecture</title>
<style>
  body {
    margin: 0;
    background: #0d0d0d;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, "Segoe UI", sans-serif;
  }
  .wrap { max-width: 760px; width: 100%; padding: 40px; }
  h1 { color: #f2f0e8; font-size: 26px; font-weight: 600; margin: 0 0 4px; text-align: center; }
  p.sub { color: #9c9a92; font-size: 14px; margin: 0 0 32px; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Bastion</h1>
  <p class="sub">Exploitability-driven, policy-gated autonomous CVE remediation</p>
  <svg width="100%" viewBox="0 0 680 712" role="img">
  <title>Bastion architecture workflow</title>
  <desc>Pipeline from GitHub App install through CVE resolution, enrichment, GPT-5.6 fix proposal, and gate.rego evaluation, branching into auto-merge, ask, or block outcomes.</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

  <g fill="#F1EFE8" stroke="#5F5E5A">
  <rect x="140" y="40" width="400" height="56" rx="8" stroke-width="0.5"/>
  <text x="340" y="58" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#2C2C2A">GitHub App installed on any repo</text>
  <text x="340" y="76" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">Triggers on push or schedule</text>
  </g>
  <line x1="340" y1="96" x2="340" y2="136" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

  <g fill="#EEEDFE" stroke="#534AB7">
  <rect x="140" y="136" width="400" height="56" rx="8" stroke-width="0.5"/>
  <text x="340" y="154" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#26215C">Scan manifest</text>
  <text x="340" y="172" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3C3489">package.json, requirements.txt, pyproject.toml</text>
  </g>
  <line x1="340" y1="192" x2="340" y2="232" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

  <g fill="#EEEDFE" stroke="#534AB7">
  <rect x="140" y="232" width="400" height="56" rx="8" stroke-width="0.5"/>
  <text x="340" y="250" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#26215C">Resolve CVEs</text>
  <text x="340" y="268" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3C3489">OSV.dev, no API key needed</text>
  </g>
  <line x1="340" y1="288" x2="340" y2="328" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

  <g fill="#EEEDFE" stroke="#534AB7">
  <rect x="140" y="328" width="400" height="56" rx="8" stroke-width="0.5"/>
  <text x="340" y="346" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#26215C">Enrich signals</text>
  <text x="340" y="364" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3C3489">EPSS score plus CISA KEV membership</text>
  </g>
  <line x1="340" y1="384" x2="340" y2="424" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

  <g fill="#EEEDFE" stroke="#534AB7">
  <rect x="140" y="424" width="400" height="56" rx="8" stroke-width="0.5"/>
  <text x="340" y="442" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#26215C">GPT-5.6 proposes fix</text>
  <text x="340" y="460" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3C3489">Generates a real patch diff</text>
  </g>
  <line x1="340" y1="480" x2="340" y2="520" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

  <g fill="#FAECE7" stroke="#D85A30">
  <rect x="140" y="520" width="400" height="56" rx="8" stroke-width="1"/>
  <text x="340" y="538" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#4A1B0C">gate.rego evaluates</text>
  <text x="340" y="556" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#712B13">Decides the autonomy boundary</text>
  </g>

  <path d="M340 576 L140 616" fill="none" stroke="#0F6E56" stroke-width="0.5" marker-end="url(#arrow)"/>
  <path d="M340 576 L340 616" fill="none" stroke="#854F0B" stroke-width="0.5" marker-end="url(#arrow)"/>
  <path d="M340 576 L540 616" fill="none" stroke="#A32D2D" stroke-width="0.5" marker-end="url(#arrow)"/>

  <g fill="#E1F5EE" stroke="#0F6E56">
  <rect x="50" y="616" width="180" height="56" rx="8" stroke-width="0.5"/>
  <text x="140" y="634" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#04342C">Auto</text>
  <text x="140" y="652" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">Opens and merges PR</text>
  </g>
  <g fill="#FAEEDA" stroke="#854F0B">
  <rect x="250" y="616" width="180" height="56" rx="8" stroke-width="0.5"/>
  <text x="340" y="634" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#412402">Ask</text>
  <text x="340" y="652" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#633806">PR plus email notify</text>
  </g>
  <g fill="#FCEBEB" stroke="#A32D2D">
  <rect x="450" y="616" width="180" height="56" rx="8" stroke-width="0.5"/>
  <text x="540" y="634" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#501313">Block</text>
  <text x="540" y="652" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#791F1F">Issue only, no merge</text>
  </g>
  </svg>
</div>
</body>
</html>
